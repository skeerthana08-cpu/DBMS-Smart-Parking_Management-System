{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <!-- Main Admin Login Card -->
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden animate__animated animate__fadeIn">
            
            <!-- Admin Identity Header -->
            <div class="card-header bg-dark text-white text-center py-4">
                <div class="display-3 mb-2"><i class="bi bi-shield-lock"></i></div>
                <h3 class="fw-bold mb-0">Admin Portal</h3>
                <p class="small text-white-50 mb-0 text-uppercase tracking-wider">Management Access Only</p>
            </div>
            
            <div class="card-body p-5 bg-white">
                <!-- FORM ACTION: Must match the route in app.py -->
                <form action="/admin_login" method="POST">
                    
                    <!-- Admin Email Input -->
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">ADMIN EMAIL</label>
                        <div class="input-group border rounded-3 overflow-hidden bg-light">
                            <span class="input-group-text bg-transparent border-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" name="email" class="form-control border-0 bg-transparent" placeholder="admin@smartpark.com" required autofocus>
                        </div>
                    </div>

                    <!-- Security Password Input -->
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">SECURITY PASSWORD</label>
                        <div class="input-group border rounded-3 overflow-hidden bg-light">
                            <span class="input-group-text bg-transparent border-0"><i class="bi bi-key text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-0 bg-transparent" placeholder="••••••••" required>
                        </div>
                    </div>

                    <!-- Login Trigger -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark btn-lg fw-bold py-2 shadow-sm border-0">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Authorized Login
                        </button>
                    </div>
                </form>

                <!-- Navigation Helper -->
                <div class="text-center mt-4 border-top pt-3">
                    <p class="small text-muted mb-0">Regular user? 
                        <a href="/login" class="text-primary text-decoration-none fw-bold">Sign in to dashboard</a>
                    </p>
                </div>
            </div>
        </div>
        
        <!-- Security Footer Note -->
        <div class="text-center mt-3">
            <p class="text-muted" style="font-size: 0.75rem;">
                <i class="bi bi-info-circle me-1"></i> This system is protected by end-to-end encryption. Unauthorized attempts will be logged.
            </p>
        </div>
    </div>
</div>

<!-- Optional: Ensure icons work if you haven't added them to base.html head yet -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
