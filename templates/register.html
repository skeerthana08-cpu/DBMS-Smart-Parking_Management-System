{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="text-center mb-4">User & Vehicle Registration</h3>
            <form action="/register" method="POST">
                <div class="mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" required></div>
                <div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control" required></div>
                <div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label>Plate Number</label><input type="text" name="plate_no" class="form-control" placeholder="ABC-1234" required></div>
                    <div class="col-md-6 mb-3"><label>Vehicle Type</label>
                        <select name="vehicle_type" class="form-select">
                            <option>2-Wheeler</option><option>4-Wheeler</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
